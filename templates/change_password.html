<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Ubah Password - Admin Panel</title>
    <link rel="icon" href="{{ url_for('static', filename='images/web.png') }}" type="image/png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('static', filename='js/tailwind-config.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-gradient-to-br from-blue-50 to-indigo-50 font-[Poppins]">
    <div class="min-h-screen flex flex-col">
      <!-- Header -->
      <header class="bg-white shadow-lg animate-fade-in">
        <nav class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between">
          <div class="flex items-center space-x-4">
            <div class="bg-white p-2 rounded-xl shadow-lg">
              <img src="{{ url_for('static', filename='images/logo_sekolah.png') }}" class="h-12 w-auto" alt="Logo SD Negeri 1 Purbalingga Lor" />
            </div>
            <div>
              <h1 class="text-2xl font-bold gradient-heading">Ubah Password</h1>
              <p class="text-sm text-gray-600">SD Negeri 1 Purbalingga Lor</p>
            </div>
          </div>
          <div class="mt-4 sm:mt-0 flex space-x-2">
            <a href="{{ url_for('lihat_absensi') }}" class="px-5 py-2 bg-white border border-primary-200 hover:bg-gray-50 text-primary-700 rounded-xl transition-all duration-300 shadow-sm hover:shadow flex items-center">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002-2h2a2 2 0 002 2M9 5h2m-2 0h2" />
              </svg>
              <span>Lihat Absensi</span>
            </a>
            <a href="{{ url_for('atur_jadwal') }}" class="flex items-center px-5 py-2 bg-white border border-primary-200 hover:border-primary-300 text-primary-700 rounded-xl transition-all duration-300 shadow-sm hover:shadow-md group">
              <svg class="w-5 h-5 mr-2 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
              </svg>
              <span>Atur Jadwal</span>
            </a>
            <a href="{{ url_for('index') }}" class="flex items-center px-5 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-xl transition-all duration-300 shadow hover:shadow-md">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
              </svg>
              <span>Beranda</span>
            </a>
            <button onclick="showLogoutModal()" class="flex items-center px-5 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl transition-all duration-300 shadow-md hover:shadow-lg">
              <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
              <span>Logout</span>
            </button>
          </div>
        </nav>
      </header>

      <!-- Main Content -->
      <main class="flex-1 animate-slide-down">
        <div class="max-w-lg mx-auto px-4 py-12">
          <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Ubah Password Admin</h2>

            {% if message %}
            <div class="mb-6 p-4 rounded-lg {{ 'bg-green-50 border border-green-200 text-green-800' if success else 'bg-red-50 border border-red-200 text-red-700' }}">
              <div class="flex">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  {% if success %}
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                  {% else %}
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                  {% endif %}
                </svg>
                <span>{{ message }}</span>
              </div>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('change_password') }}" class="space-y-6">
              <div>
                <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Password Saat Ini</label>
                <div class="relative rounded-lg shadow-sm">
                  <input type="password" name="current_password" id="current_password" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
                  <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                    <button type="button" class="toggle-password text-gray-400 hover:text-gray-600 focus:outline-none" data-target="current_password">
                      <svg class="eye-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                    </button>
                  </div>
                </div>
              </div>

              <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                <div class="relative rounded-lg shadow-sm">
                  <input type="password" name="new_password" id="new_password" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
                  <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                    <button type="button" class="toggle-password text-gray-400 hover:text-gray-600 focus:outline-none" data-target="new_password">
                      <svg class="eye-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                    </button>
                  </div>
                </div>
                <div id="password-strength" class="mt-1 text-xs"></div>
              </div>

              <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                <div class="relative rounded-lg shadow-sm">
                  <input type="password" name="confirm_password" id="confirm_password" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
                  <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                    <button type="button" class="toggle-password text-gray-400 hover:text-gray-600 focus:outline-none" data-target="confirm_password">
                      <svg class="eye-icon h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      </svg>
                    </button>
                  </div>
                </div>
                <div id="password-match" class="mt-1 text-xs"></div>
              </div>

              <div class="pt-4">
                <button
                  type="submit"
                  class="w-full py-3 px-4 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white rounded-xl transition-all duration-300 shadow-md hover:shadow-lg flex justify-center items-center"
                >
                  <span>Ubah Password</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal Konfirmasi Logout -->
    <div id="logoutModal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 z-50 hidden backdrop-blur-sm">
      <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full m-4 transform transition-all duration-300 scale-95" id="logoutModalContent">
        <div class="p-6">
          <div class="flex items-center mb-4">
            <div class="bg-red-100 rounded-full p-3">
              <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
              </svg>
            </div>
            <h3 class="text-xl font-bold ml-4 text-gray-800">Konfirmasi Logout</h3>
          </div>
          <p class="text-gray-600 mb-6 pl-2">Apakah Anda yakin ingin keluar dari sistem?</p>
          <div class="flex justify-end gap-4">
            <button onclick="hideLogoutModal()" class="px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg transition-colors duration-200 font-medium focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-200">
              Batal
            </button>
            <a href="{{ url_for('admin_logout') }}" class="px-6 py-2.5 bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white rounded-lg transition-colors duration-200 shadow-md hover:shadow-lg font-medium">
              Ya, Logout
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed bottom-5 right-5 bg-green-500 text-white px-4 py-3 rounded-lg shadow-lg hidden transform transition-all duration-300 flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
      </svg>
      <span id="notification-text"></span>
    </div>

    <!-- Script References -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/templates/change_password.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tailwind-config.js') }}"></script>
  </body>
</html>
